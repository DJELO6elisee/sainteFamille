# =============================================================================
# Config Nginx pour API (saintefamilleexcellence.ci)
# À utiliser si OPTIONS renvoie 403 Forbidden : Nginx répond 204 + CORS au preflight.
# =============================================================================
# Intégrer le bloc "map" et le "if (OPTIONS)" dans votre server { } existant
# pour le site saintefamilleexcellence.ci (dans http { } et location /api/).
# =============================================================================

# À mettre dans http { } (une seule fois)
map $http_origin $cors_origin {
    default "";
    "~^https?://(www\.)?saintefamilleexcellence\.ci$" $http_origin;
    "~^http://localhost:3000$" $http_origin;
    "~^http://127\.0\.0\.1:3000$" $http_origin;
}

